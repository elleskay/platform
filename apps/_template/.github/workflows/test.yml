name: Test (spec-driven)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec:
    name: Spec coverage gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test
      AUTH_SECRET: ci-test-secret-not-used-in-prod
      AUTH_URL: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Apply DB migrations
        working-directory: apps/web
        run: npm run db:migrate
      - name: Seed test data
        working-directory: apps/web
        run: npm run db:seed
      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck
      - name: Lint (includes spec-test/require-expect-in-spec-test rule)
        working-directory: apps/web
        run: npm run lint
      - name: Build app
        working-directory: apps/web
        run: npm run build
      - name: Run unit specs
        working-directory: apps/web
        run: npm run test:unit
      - name: Run e2e specs
        working-directory: apps/web
        run: npm run test:e2e
      - name: Spec coverage gate (fails if <100%)
        working-directory: apps/web
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-coverage
          path: apps/web/spec-coverage.md
          if-no-files-found: warn
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'apps/web/spec-coverage.md';
            if (!fs.existsSync(path)) return;
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
