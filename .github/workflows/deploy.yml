name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  # Override with repo variables if your paths differ from the convention.
  APP_DIR: ${{ vars.APP_DIR || 'apps/web' }}
  CDK_DIR: ${{ vars.CDK_DIR || 'infra/cdk/_template' }}
  NODE_VERSION: "22"

jobs:
  # Skip the deploy when secrets aren't configured. This lets the platform
  # template repo itself (and any fresh fork before secrets are set) pass CI
  # without flagging a failure. Apps with secrets configured deploy normally.
  preflight:
    name: Preflight (skip if not configured)
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -n "$ROLE_ARN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Deploy is configured. Proceeding."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS_DEPLOY_ROLE_ARN secret is not set. Skipping deploy. This is normal for the template repo itself; apps using the template need to configure secrets per docs/SETUP.md."
          fi

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install workspace dependencies
        run: npm ci

      # Apply DB migrations before the new Lambda code (which may reference
      # new columns/tables) goes live. If the app does not use Drizzle, the
      # conditional skips this step. Requires a db/migrate.ts script and
      # DATABASE_URL secret.
      - name: Apply database migrations (if db/migrate.ts exists)
        working-directory: ${{ env.APP_DIR }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -f db/migrate.ts ]; then
            npx tsx db/migrate.ts
          else
            echo "::notice::No db/migrate.ts found, skipping migration step"
          fi

      # Seed reference / demo data after migrations. Must be idempotent
      # (look up by natural key, never delete user-generated rows) so reruns
      # on every deploy are safe. See docs/variants/default-nextjs.md "Seed
      # strategy" for the recommended pattern. Skipped if the app has no
      # db/seed-demo.ts.
      - name: Seed demo data (if db/seed-demo.ts exists)
        working-directory: ${{ env.APP_DIR }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -f db/seed-demo.ts ]; then
            npx tsx db/seed-demo.ts
          else
            echo "::notice::No db/seed-demo.ts found, skipping seed step"
          fi

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ env.APP_DIR }}/.next/cache
          key: nextjs-deploy-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextjs-deploy-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js with OpenNext
        working-directory: ${{ env.APP_DIR }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ vars.APP_URL }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
        run: npm run build:open-next

      - name: Install CDK dependencies
        working-directory: ${{ env.CDK_DIR }}
        run: npm ci

      - name: CDK deploy
        working-directory: ${{ env.CDK_DIR }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ vars.APP_URL }}
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Extract deployed URL
        id: cdk
        working-directory: ${{ env.CDK_DIR }}
        run: |
          URL=$(node -e "const o=require('./cdk-outputs.json'); for(const k of Object.keys(o)) for(const k2 of Object.keys(o[k])) if(k2.endsWith('DistributionUrl')) { console.log(o[k][k2]); break; }")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Smoke test
        run: ./scripts/verify-deploy.sh "${{ steps.cdk.outputs.url }}"
